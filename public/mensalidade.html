<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/mobile-responsive.css">
    <title>Minha Mensalidade - Coringa Jiu-Jitsu</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            color: #ffc107;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #999;
            font-size: 1rem;
        }

        .status-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .status-card {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffc107;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .status-card.paid {
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.05);
        }

        .status-card.pending {
            border-color: #ff9800;
            background: rgba(255, 152, 0, 0.05);
        }

        .status-card.overdue {
            border-color: #f44336;
            background: rgba(244, 67, 54, 0.05);
        }

        .status-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .status-label {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 0.5rem;
        }

        .status-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffc107;
        }

        .status-card.paid .status-value {
            color: #4caf50;
        }

        .status-card.pending .status-value {
            color: #ff9800;
        }

        .status-card.overdue .status-value {
            color: #f44336;
        }

        .table-container {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffc107;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(255, 193, 7, 0.1);
            border-bottom: 2px solid #ffc107;
        }

        th {
            padding: 1rem;
            text-align: left;
            color: #ffc107;
            font-weight: 700;
            font-size: 0.9rem;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 193, 7, 0.1);
            color: #ccc;
        }

        tbody tr:hover {
            background: rgba(255, 193, 7, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-badge.paid {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .status-badge.pending {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        .status-badge.overdue {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            background: linear-gradient(135deg, #ffc107 0%, #ffb300 100%);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .btn:hover {
            background: linear-gradient(135deg, #ffb300 0%, #ffa500 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        }

        .info-box {
            background: rgba(255, 193, 7, 0.1);
            border-left: 3px solid #ffc107;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: #ccc;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .status-cards {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Minha Mensalidade</h1>
            <p class="subtitle">Acompanhe o status dos seus pagamentos</p>
        </div>

        <div class="info-box">
            ℹ️ Aqui você pode visualizar o status de suas mensalidades. Mantenha seus pagamentos em dia para não perder o acesso às aulas.
        </div>

        <div class="status-cards">
            <div class="status-card paid">
                <div class="status-icon">✓</div>
                <div class="status-label">Pagas</div>
                <div class="status-value" id="paidCount">0</div>
            </div>
            <div class="status-card pending">
                <div class="status-icon">⏳</div>
                <div class="status-label">Pendentes</div>
                <div class="status-value" id="pendingCount">0</div>
            </div>
            <div class="status-card overdue">
                <div class="status-icon">⚠️</div>
                <div class="status-label">Vencidas</div>
                <div class="status-value" id="overdueCount">0</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Mês</th>
                        <th>Valor</th>
                        <th>Vencimento</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="mensalidadeList">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #999;">Carregando...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/auth.js"></script>
    <script>
        // Dados de exemplo - em produção, vir do servidor
        const mockMensalidades = [
            { mes: 'Janeiro 2025', valor: 150, vencimento: '2025-01-10', status: 'paid', dataPagamento: '2025-01-08' },
            { mes: 'Fevereiro 2025', valor: 150, vencimento: '2025-02-10', status: 'paid', dataPagamento: '2025-02-05' },
            { mes: 'Março 2025', valor: 150, vencimento: '2025-03-10', status: 'pending' },
            { mes: 'Abril 2025', valor: 150, vencimento: '2025-04-10', status: 'pending' },
            { mes: 'Maio 2025', valor: 150, vencimento: '2025-05-10', status: 'overdue' },
        ];

        function formatarData(data) {
            return new Date(data).toLocaleDateString('pt-BR');
        }

        function formatarValor(valor) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor);
        }

        function carregarMensalidades() {
            const tbody = document.getElementById('mensalidadeList');
            tbody.innerHTML = '';

            let paidCount = 0;
            let pendingCount = 0;
            let overdueCount = 0;

            mockMensalidades.forEach(m => {
                if (m.status === 'paid') paidCount++;
                if (m.status === 'pending') pendingCount++;
                if (m.status === 'overdue') overdueCount++;

                const row = document.createElement('tr');
                const statusText = m.status === 'paid' ? 'Paga' : m.status === 'pending' ? 'Pendente' : 'Vencida';
                const statusBadge = `<span class="status-badge ${m.status}">${statusText}</span>`;
                const acaoBtn = m.status === 'pending' || m.status === 'overdue' 
                    ? `<button class="btn" onclick="pagarMensalidade('${m.mes}')">Pagar</button>`
                    : `<span style="color: #999;">Pago em ${formatarData(m.dataPagamento)}</span>`;

                row.innerHTML = `
                    <td>${m.mes}</td>
                    <td>${formatarValor(m.valor)}</td>
                    <td>${formatarData(m.vencimento)}</td>
                    <td>${statusBadge}</td>
                    <td>${acaoBtn}</td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('paidCount').textContent = paidCount;
            document.getElementById('pendingCount').textContent = pendingCount;
            document.getElementById('overdueCount').textContent = overdueCount;
        }

        function pagarMensalidade(mes) {
            alert(`Funcionalidade de pagamento para ${mes} será implementada em breve!\n\nEm produção, isso integraria com um sistema de pagamento como Stripe ou PagSeguro.`);
        }

        // Verificar autenticação
        window.addEventListener('load', () => {
            const user = getUser();
            if (!user) {
                window.location.href = '/login.html';
            }
            carregarMensalidades();
        });
    </script>
</body>
</html>
