<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Coringa Jiu-Jitsu</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/mobile-responsive.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
        }

        header {
            background: #000;
            border-bottom: 2px solid #ffc107;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .coringa-logo {
            width: 40px;
            height: 40px;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffc107;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-logout {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: #ffb300;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* PROFILE CARD */
        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ffc107;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 2rem;
            align-items: center;
        }

        .profile-avatar {
            width: 200px;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 3px solid #ffc107;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .profile-avatar svg {
            width: 100%;
            height: 100%;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .profile-name {
            font-size: 2rem;
            font-weight: 800;
            color: #ffc107;
        }

        .profile-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .detail-item {
            background: rgba(255, 193, 7, 0.1);
            border-left: 4px solid #ffc107;
            padding: 1rem;
            border-radius: 8px;
        }

        .detail-label {
            color: #999;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .detail-value {
            color: #ffc107;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .btn-customize {
            align-self: flex-start;
            background: linear-gradient(135deg, #ffc107 0%, #ffb300 100%);
            color: #000;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-customize:hover {
            background: linear-gradient(135deg, #ffb300 0%, #ffa500 100%);
            transform: translateY(-2px);
        }

        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ffc107;
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #ffc107;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #999;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* SECTIONS */
        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ffc107;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            color: #ffc107;
            margin-bottom: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 1.5rem;
            background: #ffc107;
            border-radius: 2px;
        }

        /* ATTENDANCE TABLE */
        .attendance-table {
            width: 100%;
            border-collapse: collapse;
        }

        .attendance-table thead {
            background: rgba(255, 193, 7, 0.1);
        }

        .attendance-table th {
            padding: 1rem;
            text-align: left;
            color: #ffc107;
            font-weight: 700;
            border-bottom: 2px solid #ffc107;
        }

        .attendance-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 193, 7, 0.2);
        }

        .attendance-table tr:hover {
            background: rgba(255, 193, 7, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .status-present {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .status-absent {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        /* PAYMENT STATUS */
        .payment-status {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #ffc107;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .payment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .payment-month {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .payment-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ffc107;
        }

        .payment-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #999;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #666;
            border-top: 1px solid rgba(255, 193, 7, 0.2);
        }

        @media (max-width: 1024px) {
            .profile-details {
                grid-template-columns: repeat(2, 1fr);
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .profile-card {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .profile-avatar {
                width: 150px;
                height: 150px;
                margin: 0 auto;
            }

            .profile-name {
                font-size: 1.5rem;
            }

            .profile-details {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .attendance-table {
                font-size: 0.85rem;
            }

            .attendance-table th,
            .attendance-table td {
                padding: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .profile-avatar {
                width: 120px;
                height: 120px;
            }

            .profile-name {
                font-size: 1.2rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .section {
                padding: 1.5rem;
            }

            .section-title {
                font-size: 1.2rem;
            }
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #ffc107;
        }

        .spinner {
            border: 4px solid rgba(255, 193, 7, 0.2);
            border-top: 4px solid #ffc107;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="/coringa-header-logo.png" alt="Coringa" class="coringa-logo">
            <div class="header-title">CORINGA JIU-JITSU</div>
        </div>
        <div class="header-right">
            <button class="btn-logout" onclick="logout()">Sair</button>
        </div>
    </header>

    <div class="container">
        <!-- PROFILE CARD -->
        <div class="profile-card" id="profileCard">
            <div class="profile-loading">
                <div class="spinner"></div>
                <p>Carregando perfil...</p>
            </div>
        </div>

        <!-- STATS GRID -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="totalClasses">0</div>
                <div class="stat-label">Aulas Totais</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="presentCount">0</div>
                <div class="stat-label">Presentes</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">❌</div>
                <div class="stat-value" id="absentCount">0</div>
                <div class="stat-label">Ausentes</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-value" id="attendanceRate">0%</div>
                <div class="stat-label">Taxa de Presença</div>
            </div>
        </div>

        <!-- ATTENDANCE SECTION -->
        <div class="section">
            <div class="section-title">Histórico de Presença</div>
            <div id="attendanceContent">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando histórico...</p>
                </div>
            </div>
        </div>

        <!-- PAYMENT SECTION -->
        <div class="section">
            <div class="section-title">Mensalidade</div>
            <div id="paymentContent">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando informações de mensalidade...</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Coringa Jiu-Jitsu - Dashboard do Aluno</p>
    </footer>

    <script src="/auth.js"></script>
    <script>
        const beltColors = {
            'branca': '#ffffff',
            'branca-infantil': '#f0f0f0',
            'cinza': '#808080',
            'cinza-infantil': '#a9a9a9',
            'amarela': '#ffc107',
            'amarela-infantil': '#ffed4e',
            'laranja': '#ff9800',
            'laranja-infantil': '#ffb74d',
            'verde': '#4caf50',
            'verde-infantil': '#81c784',
            'azul': '#2196f3',
            'roxa': '#9c27b0',
            'marrom': '#795548',
            'preta': '#000000',
            'coral': '#ff7043'
        };

        let currentUser = null;

        async function initPage() {
            const user = getAuth();
            if (!user) {
                window.location.href = '/login.html';
                return;
            }

            currentUser = user;
            await loadUserProfile();
            await loadAttendance();
            await loadPaymentInfo();
        }

        async function loadUserProfile() {
            try {
                const response = await fetch(`/api/avatar/${currentUser.id}`);
                const userData = await response.json();

                const beltColor = beltColors[userData.belt] || '#ffffff';
                const beltName = userData.belt ? userData.belt.replace('-', ' ').toUpperCase() : 'SEM FAIXA';

                const profileCard = document.getElementById('profileCard');
                profileCard.innerHTML = `
                    <div class="profile-avatar">
                        <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
                            <rect x="50" y="40" width="100" height="120" rx="10" fill="${beltColor}" stroke="#333" stroke-width="2"/>
                            <rect x="20" y="50" width="30" height="80" rx="5" fill="${beltColor}" stroke="#333" stroke-width="2"/>
                            <rect x="150" y="50" width="30" height="80" rx="5" fill="${beltColor}" stroke="#333" stroke-width="2"/>
                            <rect x="40" y="130" width="120" height="25" fill="#333" stroke="#222" stroke-width="2"/>
                            <line x1="40" y1="142" x2="160" y2="142" stroke="${beltColor}" stroke-width="3"/>
                            <rect x="70" y="160" width="25" height="80" rx="5" fill="${beltColor}" stroke="#333" stroke-width="2"/>
                            <rect x="105" y="160" width="25" height="80" rx="5" fill="${beltColor}" stroke="#333" stroke-width="2"/>
                            <circle cx="100" cy="25" r="15" fill="#fdbcb4" stroke="#333" stroke-width="2"/>
                            <circle cx="95" cy="22" r="2" fill="#000"/>
                            <circle cx="105" cy="22" r="2" fill="#000"/>
                            <path d="M 95 28 Q 100 30 105 28" stroke="#000" stroke-width="1.5" fill="none"/>
                        </svg>
                    </div>
                    <div class="profile-info">
                        <div class="profile-name">${userData.name}</div>
                        <div class="profile-details">
                            <div class="detail-item">
                                <div class="detail-label">Email</div>
                                <div class="detail-value">${currentUser.email}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Faixa</div>
                                <div class="detail-value">${beltName}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Membro desde</div>
                                <div class="detail-value">2024</div>
                            </div>
                        </div>
                        <button class="btn-customize" onclick="window.location.href='/avatar-customizer.html'">
                            Personalizar Avatar
                        </button>
                    </div>
                `;
            } catch (error) {
                console.error('Erro ao carregar perfil:', error);
            }
        }

        async function loadAttendance() {
            try {
                const response = await fetch(`/api/checkin/history/${currentUser.id}`);
                const data = await response.json();

                let totalClasses = 0;
                let presentCount = 0;
                let absentCount = 0;

                if (data.checkins && data.checkins.length > 0) {
                    totalClasses = data.checkins.length;
                    presentCount = data.checkins.filter(c => c.status === 'present').length;
                    absentCount = data.checkins.filter(c => c.status === 'absent').length;

                    const attendanceRate = totalClasses > 0 ? Math.round((presentCount / totalClasses) * 100) : 0;

                    document.getElementById('totalClasses').textContent = totalClasses;
                    document.getElementById('presentCount').textContent = presentCount;
                    document.getElementById('absentCount').textContent = absentCount;
                    document.getElementById('attendanceRate').textContent = attendanceRate + '%';

                    const tableHTML = `
                        <table class="attendance-table">
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Aula</th>
                                    <th>Horário</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.checkins.map(checkin => `
                                    <tr>
                                        <td>${new Date(checkin.date).toLocaleDateString('pt-BR')}</td>
                                        <td>${checkin.className || 'Aula'}</td>
                                        <td>${checkin.time || '--:--'}</td>
                                        <td>
                                            <span class="status-badge status-${checkin.status === 'present' ? 'present' : 'absent'}">
                                                ${checkin.status === 'present' ? '✓ Presente' : '✗ Ausente'}
                                            </span>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;

                    document.getElementById('attendanceContent').innerHTML = tableHTML;
                } else {
                    document.getElementById('attendanceContent').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>Nenhum registro de presença ainda</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Erro ao carregar presença:', error);
                document.getElementById('attendanceContent').innerHTML = `
                    <div class="empty-state">
                        <p>Erro ao carregar histórico de presença</p>
                    </div>
                `;
            }
        }

        async function loadPaymentInfo() {
            try {
                // Dados de exemplo - substituir por API real
                const paymentHTML = `
                    <div class="payment-status">
                        <div class="payment-header">
                            <div class="payment-month">Fevereiro 2026</div>
                            <div class="payment-value">R$ 150,00</div>
                        </div>
                        <div class="payment-info">
                            <span>Status: <strong style="color: #4caf50;">✓ Pago</strong></span>
                            <span>Vencimento: 28/02/2026</span>
                        </div>
                    </div>
                    <div class="payment-status">
                        <div class="payment-header">
                            <div class="payment-month">Março 2026</div>
                            <div class="payment-value">R$ 150,00</div>
                        </div>
                        <div class="payment-info">
                            <span>Status: <strong style="color: #ffc107;">⏱ Pendente</strong></span>
                            <span>Vencimento: 28/03/2026</span>
                        </div>
                    </div>
                `;

                document.getElementById('paymentContent').innerHTML = paymentHTML;
            } catch (error) {
                console.error('Erro ao carregar mensalidade:', error);
            }
        }

        function logout() {
            clearAuth();
            window.location.href = '/login.html';
        }

        initPage();
    </script>
</body>
</html>
