<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/mobile-responsive.css">
    <title>Alterar Senha - Coringa Jiu-Jitsu</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #ffc107;
            border-radius: 15px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(255, 193, 7, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 1.8rem;
            color: #ffc107;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ffc107;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ffc107;
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
        }

        input::placeholder {
            color: #666;
        }

        .password-group {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #ffc107;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .password-toggle:hover {
            color: #ffb300;
            transform: translateY(-50%) scale(1.1);
        }

        .password-group input {
            padding-right: 2.8rem;
        }

        .password-requirements {
            background: rgba(255, 193, 7, 0.1);
            border-left: 3px solid #ffc107;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
            color: #ccc;
        }

        .requirement.met {
            color: #4caf50;
        }

        .requirement-icon {
            width: 20px;
            height: 20px;
            margin-right: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ffc107 0%, #ffb300 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .btn:hover {
            background: linear-gradient(135deg, #ffb300 0%, #ffa500 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 193, 7, 0.5);
        }

        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .success {
            color: #4caf50;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .info {
            background: rgba(76, 175, 80, 0.1);
            border-left: 3px solid #4caf50;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/coringa-header-logo.png" alt="Coringa">
            </div>
            <h1>Alterar Senha</h1>
            <p class="subtitle">Primeira vez? Crie uma senha segura!</p>
        </div>

        <div class="info">
            ⚠️ Por segurança, você precisa alterar sua senha antes de continuar.
        </div>

        <form id="changePasswordForm">
            <div class="form-group password-group">
                <label for="currentPassword">Senha Atual</label>
                <input type="password" id="currentPassword" placeholder="Digite sua senha atual" required>
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility('currentPassword', this)">👁️</button>
                <div class="error" id="currentPasswordError"></div>
            </div>

            <div class="form-group password-group">
                <label for="newPassword">Nova Senha</label>
                <input type="password" id="newPassword" placeholder="Digite sua nova senha" required>
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility('newPassword', this)">👁️</button>
                <div class="error" id="newPasswordError"></div>
            </div>

            <div class="password-requirements">
                <strong>Requisitos de Segurança:</strong>
                <div class="requirement" id="req-length">
                    <span class="requirement-icon">✓</span>
                    <span>Mínimo 8 caracteres</span>
                </div>
                <div class="requirement" id="req-uppercase">
                    <span class="requirement-icon">✓</span>
                    <span>Pelo menos 1 letra maiúscula</span>
                </div>
                <div class="requirement" id="req-lowercase">
                    <span class="requirement-icon">✓</span>
                    <span>Pelo menos 1 letra minúscula</span>
                </div>
                <div class="requirement" id="req-number">
                    <span class="requirement-icon">✓</span>
                    <span>Pelo menos 1 número</span>
                </div>
                <div class="requirement" id="req-special">
                    <span class="requirement-icon">✓</span>
                    <span>Pelo menos 1 caractere especial (!@#$%^&*)</span>
                </div>
            </div>

            <div class="form-group password-group">
                <label for="confirmPassword">Confirmar Senha</label>
                <input type="password" id="confirmPassword" placeholder="Confirme sua nova senha" required>
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirmPassword', this)">👁️</button>
                <div class="error" id="confirmPasswordError"></div>
            </div>

            <button type="submit" class="btn" id="submitBtn">Alterar Senha</button>
            <div class="error" id="formError"></div>
            <div class="success" id="formSuccess"></div>
        </form>
    </div>

    <script src="/auth.js"></script>
    <script>
        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '👁️‍🗨️';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
            }
        }

        const form = document.getElementById('changePasswordForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');

        // Validar requisitos de senha em tempo real
        newPasswordInput.addEventListener('input', () => {
            const password = newPasswordInput.value;
            
            // Comprimento
            const lengthReq = document.getElementById('req-length');
            if (password.length >= 8) {
                lengthReq.classList.add('met');
            } else {
                lengthReq.classList.remove('met');
            }

            // Maiúscula
            const uppercaseReq = document.getElementById('req-uppercase');
            if (/[A-Z]/.test(password)) {
                uppercaseReq.classList.add('met');
            } else {
                uppercaseReq.classList.remove('met');
            }

            // Minúscula
            const lowercaseReq = document.getElementById('req-lowercase');
            if (/[a-z]/.test(password)) {
                lowercaseReq.classList.add('met');
            } else {
                lowercaseReq.classList.remove('met');
            }

            // Número
            const numberReq = document.getElementById('req-number');
            if (/[0-9]/.test(password)) {
                numberReq.classList.add('met');
            } else {
                numberReq.classList.remove('met');
            }

            // Caractere especial
            const specialReq = document.getElementById('req-special');
            if (/[!@#$%^&*]/.test(password)) {
                specialReq.classList.add('met');
            } else {
                specialReq.classList.remove('met');
            }

            // Validar confirmação
            if (confirmPasswordInput.value && password !== confirmPasswordInput.value) {
                document.getElementById('confirmPasswordError').textContent = 'As senhas não correspondem';
            } else {
                document.getElementById('confirmPasswordError').textContent = '';
            }
        });

        confirmPasswordInput.addEventListener('input', () => {
            if (newPasswordInput.value !== confirmPasswordInput.value) {
                document.getElementById('confirmPasswordError').textContent = 'As senhas não correspondem';
            } else {
                document.getElementById('confirmPasswordError').textContent = '';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Limpar erros
            document.getElementById('currentPasswordError').textContent = '';
            document.getElementById('newPasswordError').textContent = '';
            document.getElementById('confirmPasswordError').textContent = '';
            document.getElementById('formError').textContent = '';
            document.getElementById('formSuccess').textContent = '';

            // Validar
            if (!currentPassword) {
                document.getElementById('currentPasswordError').textContent = 'Senha atual obrigatória';
                return;
            }

            if (!newPassword) {
                document.getElementById('newPasswordError').textContent = 'Nova senha obrigatória';
                return;
            }

            if (newPassword !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = 'As senhas não correspondem';
                return;
            }

            // Validar requisitos
            if (newPassword.length < 8) {
                document.getElementById('newPasswordError').textContent = 'Mínimo 8 caracteres';
                return;
            }

            if (!/[A-Z]/.test(newPassword)) {
                document.getElementById('newPasswordError').textContent = 'Deve conter letra maiúscula';
                return;
            }

            if (!/[a-z]/.test(newPassword)) {
                document.getElementById('newPasswordError').textContent = 'Deve conter letra minúscula';
                return;
            }

            if (!/[0-9]/.test(newPassword)) {
                document.getElementById('newPasswordError').textContent = 'Deve conter número';
                return;
            }

            if (!/[!@#$%^&*]/.test(newPassword)) {
                document.getElementById('newPasswordError').textContent = 'Deve conter caractere especial (!@#$%^&*)';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Alterando...';

            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        currentPassword,
                        newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('formSuccess').textContent = 'Senha alterada com sucesso! Redirecionando...';
                    setTimeout(() => {
                        const user = getUser();
                        if (user.role === 'aluno') {
                            window.location.href = '/dashboard-aluno.html';
                        } else if (user.role === 'professor') {
                            window.location.href = '/dashboard-professor.html';
                        } else if (user.role === 'admin') {
                            window.location.href = '/dashboard-admin.html';
                        }
                    }, 2000);
                } else {
                    document.getElementById('formError').textContent = data.message || 'Erro ao alterar senha';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Alterar Senha';
                }
            } catch (error) {
                document.getElementById('formError').textContent = 'Erro ao conectar com servidor';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Alterar Senha';
            }
        });

        // Verificar se usuário está autenticado
        window.addEventListener('load', () => {
            const user = getUser();
            if (!user) {
                window.location.href = '/login.html';
            }
        });
    </script>
</body>
</html>
