<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/mobile-responsive.css">
    <title>Dashboard Admin - Coringa Jiu-Jitsu</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET E BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #000000;
            color: #fff;
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.8);
            border-right: 2px solid #ffc107;
            padding: 2rem 1.5rem;
            overflow-y: auto;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 193, 7, 0.2);
        }

        .sidebar-logo img {
            width: 50px;
            height: 50px;
            border-radius: 0;
            background: transparent;
            padding: 0;
        }

        .sidebar-logo h2 {
            font-size: 0.9rem;
            color: #ffc107;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 0.5rem;
        }

        .sidebar-menu button {
            width: 100%;
            background: transparent;
            border: none;
            color: #999;
            padding: 1rem;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }

        .sidebar-menu button:hover {
            background: rgba(255, 193, 7, 0.1);
            color: #ffc107;
        }

        .sidebar-menu button.active {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border-left: 3px solid #ffc107;
        }

        /* ===== MAIN CONTENT LAYOUT ===== */
        .main-content {
            margin-left: 280px;
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ===== HEADER ===== */
        header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid #ffc107;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 50;
        }

        .logo-with-text {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-right: auto;
        }

        .coringa-logo {
            height: 60px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        .header-logo-text {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ffc107;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        header h1 {
            font-size: 1.8rem;
            color: #ffc107;
            margin: 0 auto;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logout-btn {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #ffb300;
            transform: scale(1.05);
        }

        /* ===== CONTENT CONTAINER COM MARCA D'ÁGUA ===== */
        .content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }

        /* Marca d'água centralizada - pseudo-elemento */
        .content::before {
            content: '';
            position: fixed;
            top: 50%;
            left: calc(280px + 50%);
            transform: translate(-50%, -50%);
            width: 500px;
            height: 600px;
            background-image: url('/watermark-joker.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.15;
            pointer-events: none;
            z-index: 5;
        }

        /* Texto motivacional ao lado esquerdo da marca d'água */
        .motivational-text {
            position: fixed;
            top: 50%;
            left: calc(280px + 10%);
            transform: translateY(-50%);
            width: 380px;
            color: #ffffff;
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 1.8rem;
            font-style: italic;
            font-weight: 600;
            text-align: center;
            line-height: 2.2;
            pointer-events: none;
            z-index: 5;
            opacity: 0.15;
            letter-spacing: 1px;
        }

        /* ===== PAGES ===== */
        .page {
            position: relative;
            z-index: 15;
            display: none;
        }

        .page.active {
            display: block;
        }

        /* ===== STATS CARDS ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            position: relative;
            z-index: 15;
        }

        .stat-card {
            background: rgba(255, 193, 7, 0.1);
            border: 2px solid #ffc107;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
        }

        .stat-card h3 {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .stat-card .number {
            font-size: 2.5rem;
            color: #ffc107;
            font-weight: 700;
        }

        /* ===== FORMS ===== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ffc107;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 193, 7, 0.1);
            border: 2px solid #ffc107;
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #666;
        }

        /* ===== BUTTONS ===== */
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary {
            background: #ffc107;
            color: #000;
        }

        .btn-primary:hover {
            background: #ffb300;
        }

        .btn-danger {
            color: #000;
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-secondary {
            color: #000;
            background: #666;
        }

        .btn-secondary:hover {
            background: #555;
        }

        /* ===== TABLES ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }

        table th {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            padding: 1rem;
            text-align: left;
            border-bottom: 2px solid #ffc107;
        }

        table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 193, 7, 0.1);
        }

        table tr:hover {
            background: rgba(255, 193, 7, 0.05);
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 10%;           width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 2px solid #ffc107;
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #ffc107;
            padding-bottom: 1rem;
        }

        .modal-header h2 {
            color: #ffc107;
        }

        .close-btn {
            background: none;
            border: none;
            color: #ffc107;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ===== MESSAGES ===== */
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background: rgba(40, 167, 69, 0.2);
            border: 2px solid #28a745;
            color: #28a745;
            display: block;
        }

        .message.error {
            background: rgba(220, 53, 69, 0.2);
            border: 2px solid #dc3545;
            color: #dc3545;
            display: block;
        }

        /* ===== SELECT ===== */
        select {
            background: rgba(0, 0, 0, 0.9);
            color: #ffc107;
            border: 2px solid #ffc107;
            padding: 0.8rem;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        select option {
            background: #1a1a1a;
            color: #ffc107;
            padding: 0.5rem;
        }

        select option:checked {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        /* Customizar dropdown */
        select {
            appearance: none;
            background-repeat: no-repeat;
            background-position: right 0.8rem center;
            background-size: 1.2em 1.2em;
            padding-right: 2.5rem;
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="/coringa-header-logo.png" alt="Logo Coringa">
            <h2>CORINGA</h2>
        </div>
        <ul class="sidebar-menu">
            <li><button class="menu-btn active" data-page="dashboard">Dashboard</button></li>
            <li><button class="menu-btn" data-page="usuarios">Gerenciar Usuários</button></li>
            <li><button class="menu-btn" data-page="configuracoes">Configurações</button></li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <!-- HEADER -->
        <header>
            <div class="logo-with-text">
                <img src="/coringa-header-logo.png" alt="Coringa" class="coringa-logo" style="width: 50px; height: 50px;">
            </div>
            <h1 style="flex: 1; text-align: center; font-size: 2.5rem; margin: 0;">Admin</h1>
            <div class="user-info">
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>

        <!-- CONTENT AREA COM MARCA D'ÁGUA -->
        <!-- TEXTO MOTIVACIONAL -->
        <div class="motivational-text" id="motivational-quote"></div>
        <div class="content">
            <!-- Dashboard Page -->
            <div id="dashboard" class="page active">
                <h2 style="color: #ffc107; margin-bottom: 1.5rem;">Dashboard</h2>
                <div class="stats">
                    <div class="stat-card">
                        <h3>Total de Usuários</h3>
                        <div class="number" id="total-usuarios">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Professores</h3>
                        <div class="number" id="total-professores">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Alunos</h3>
                        <div class="number" id="total-alunos">0</div>
                    </div>
                </div>
            </div>

            <!-- Gerenciar Usuários Page -->
            <div id="usuarios" class="page">
                <h2 style="color: #ffc107; margin-bottom: 1.5rem;">Gerenciar Usuários</h2>
                <div id="message" class="message"></div>

                <div style="background: rgba(255, 193, 7, 0.1); border: 2px solid #ffc107; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;">
                    <h3 style="color: #ffc107; margin-bottom: 1rem;">Adicionar Novo Usuário</h3>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="new-email" placeholder="usuario@coringa.com">
                    </div>
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="new-name" placeholder="Nome completo">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="new-password" placeholder="Digite a senha">
                    </div>
                    <div class="form-group">
                        <label>Tipo de Usuário</label>
                        <select id="new-role">
                            <option value="user">Aluno</option>
                            <option value="professor">Professor</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="addUser()">Adicionar Usuário</button>
                </div>

                <h3 style="color: #ffc107; margin-top: 2rem; margin-bottom: 1rem;">Lista de Usuários</h3>
                
                <!-- Filtros da Tabela -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
                    <div>
                        <input type="text" id="filterNome" placeholder="Filtrar por Nome" style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid #ffc107; border-radius: 8px; color: #fff; font-family: 'Poppins', sans-serif;">
                    </div>
                    <div>
                        <input type="text" id="filterEmail" placeholder="Filtrar por Email" style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid #ffc107; border-radius: 8px; color: #fff; font-family: 'Poppins', sans-serif;">
                    </div>
                    <div>
                        <select id="filterTipo" style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid #ffc107; border-radius: 8px; color: #fff; font-family: 'Poppins', sans-serif;">
                            <option value="">Todos os Tipos</option>
                            <option value="aluno">Aluno</option>
                            <option value="professor">Professor</option>
                        </select>
                    </div>
                    <div>
                        <select id="filterFaixa" style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid #ffc107; border-radius: 8px; color: #fff; font-family: 'Poppins', sans-serif;">
                            <option value="">Todas as Faixas</option>
                            <optgroup label="Infantil (até 15 anos)">
                                <option value="Branca Infantil">Branca Infantil</option>
                                <option value="Cinza Infantil">Cinza Infantil</option>
                                <option value="Amarela Infantil">Amarela Infantil</option>
                                <option value="Laranja Infantil">Laranja Infantil</option>
                                <option value="Verde Infantil">Verde Infantil</option>
                            </optgroup>
                            <optgroup label="Adulto (acima de 15 anos)">
                                <option value="Branca">Branca</option>
                                <option value="Cinza">Cinza</option>
                                <option value="Amarela">Amarela</option>
                                <option value="Laranja">Laranja</option>
                                <option value="Vermelha">Vermelha</option>
                                <option value="Azul">Azul</option>
                                <option value="Roxa">Roxa</option>
                                <option value="Marrom">Marrom</option>
                                <option value="Preta">Preta</option>
                                <option value="Coral">Coral</option>
                            </optgroup>
                        </select>
                    </div>
                    <div>
                        <button class="btn btn-primary" onclick="limparFiltros()" style="width: 100%;">Limpar Filtros</button>
                    </div>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Nome</th>
                            <th>Tipo</th>
                            <th>Faixa</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="users-list">
                        <!-- Usuários serão carregados aqui -->
                    </tbody>
                </table>
            </div>

            <!-- Configurações Page -->
            <div id="configuracoes" class="page">
                <h2 style="color: #ffc107; margin-bottom: 1.5rem;">Configurações</h2>
                <div style="background: rgba(255, 193, 7, 0.1); border: 2px solid #ffc107; border-radius: 12px; padding: 1.5rem;">
                    <h3 style="color: #ffc107; margin-bottom: 1rem;">Sistema</h3>
                    <p style="color: #999; margin-bottom: 1rem;">Versão: 1.0.0</p>
                    <p style="color: #999;">Desenvolvido por Aron Nascimento</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL PARA EDITAR USUÁRIO -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Usuário</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="edit-email" placeholder="usuario@coringa.com">
            </div>
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="edit-name" placeholder="Nome completo">
            </div>
            <div class="form-group">
                <label>Tipo de Usuário</label>
                <select id="edit-role">
                    <option value="user">Aluno</option>
                    <option value="professor">Professor</option>
                </select>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="updateUser()">Salvar</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let currentEditingUserId = null;

        // Carregar dados ao iniciar
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadUsers();
            setupMenuButtons();
        });

        // Setup dos botões do menu
        function setupMenuButtons() {
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const pageName = this.getAttribute('data-page');
                    showPage(pageName);
                    
                    // Atualizar botão ativo
                    document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        // Mostrar página específica
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageName).classList.add('active');
        }

        // Carregar estatísticas
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                document.getElementById('total-usuarios').textContent = data.total || 0;
                document.getElementById('total-professores').textContent = data.professors || 0;
                document.getElementById('total-alunos').textContent = data.students || 0;
            } catch (error) {
                console.error('Erro ao carregar estatísticas:', error);
            }
        }

        // Carregar usuários
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                if (!response.ok) {
                    throw new Error('Erro ao buscar usuarios');
                }
                const users = await response.json();
                const usersList = document.getElementById('users-list');
                
                if (!usersList) {
                    console.error('Elemento users-list nao encontrado');
                    return;
                }
                
                usersList.innerHTML = '';

                if (!Array.isArray(users) || users.length === 0) {
                    usersList.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">Nenhum usuario cadastrado</td></tr>';
                    return;
                }

                users.forEach(user => {
                    const row = document.createElement('tr');
                    const beltDisplay = user.belt || 'Branca';
                    row.innerHTML = `
                        <td>${user.email}</td>
                        <td>${user.name}</td>
                        <td>${user.role === 'admin' ? 'Admin' : user.role === 'professor' ? 'Professor' : 'Aluno'}</td>
                        <td>${beltDisplay}</td>
                        <td>
                            <button class="btn btn-primary" onclick="editUser('${user.id}', '${user.email}', '${user.name}', '${user.role}')">Editar</button>
                            <button class="btn btn-danger" onclick="deleteUser('${user.id}')">Deletar</button>
                        </td>
                    `;
                    usersList.appendChild(row);
                });
            } catch (error) {
                console.error('Erro ao carregar usuários:', error);
            }
        }

        // Adicionar novo usuário
        async function addUser() {
            const email = document.getElementById('new-email').value;
            const name = document.getElementById('new-name').value;
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;

            if (!email || !name || !password) {
                showMessage('Por favor, preencha todos os campos', 'error');
                return;
            }

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name, password, role })
                });

                if (response.ok) {
                    showMessage('Usuário adicionado com sucesso!', 'success');
                    document.getElementById('new-email').value = '';
                    document.getElementById('new-name').value = '';
                    document.getElementById('new-password').value = '';
                    loadUsers();
                    loadStats();
                } else {
                    showMessage('Erro ao adicionar usuário', 'error');
                }
            } catch (error) {
                console.error('Erro:', error);
                showMessage('Erro ao adicionar usuário', 'error');
            }
        }

        // Editar usuário
        function editUser(id, email, name, role) {
            currentEditingUserId = id;
            document.getElementById('edit-email').value = email;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-role').value = role;
            document.getElementById('editModal').classList.add('active');
        }

        // Atualizar usuário
        async function updateUser() {
            const email = document.getElementById('edit-email').value;
            const name = document.getElementById('edit-name').value;
            const role = document.getElementById('edit-role').value;

            try {
                const response = await fetch(`/api/users/${currentEditingUserId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name, role })
                });

                if (response.ok) {
                    showMessage('Usuário atualizado com sucesso!', 'success');
                    closeModal();
                    loadUsers();
                    loadStats();
                } else {
                    showMessage('Erro ao atualizar usuário', 'error');
                }
            } catch (error) {
                console.error('Erro:', error);
                showMessage('Erro ao atualizar usuário', 'error');
            }
        }

        // Deletar usuário
        async function deleteUser(id) {
            if (!confirm('Tem certeza que deseja deletar este usuário?')) return;

            try {
                const response = await fetch(`/api/users/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showMessage('Usuário deletado com sucesso!', 'success');
                    loadUsers();
                    loadStats();
                } else {
                    showMessage('Erro ao deletar usuário', 'error');
                }
            } catch (error) {
                console.error('Erro:', error);
                showMessage('Erro ao deletar usuário', 'error');
            }
        }

        // Fechar modal
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            currentEditingUserId = null;
        }

        // Mostrar mensagem
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }

        // Filtrar usuários na tabela
        function aplicarFiltros() {
            const filterNome = document.getElementById('filterNome').value.toLowerCase();
            const filterEmail = document.getElementById('filterEmail').value.toLowerCase();
            const filterTipo = document.getElementById('filterTipo').value.toLowerCase();
            const filterFaixa = document.getElementById('filterFaixa').value;

            const rows = document.querySelectorAll('#users-list tr');
            let visibleCount = 0;

            rows.forEach(row => {
                const email = row.cells[0]?.textContent.toLowerCase() || '';
                const nome = row.cells[1]?.textContent.toLowerCase() || '';
                const tipo = row.cells[2]?.textContent.toLowerCase() || '';
                const faixa = row.cells[3]?.textContent || '';

                const matchNome = nome.includes(filterNome);
                const matchEmail = email.includes(filterEmail);
                const matchTipo = !filterTipo || tipo.includes(filterTipo);
                const matchFaixa = !filterFaixa || faixa === filterFaixa;

                if (matchNome && matchEmail && matchTipo && matchFaixa) {
                    row.style.display = '';
                    visibleCount++;
                } else {
                    row.style.display = 'none';
                }
            });

            if (visibleCount === 0) {
                const tbody = document.getElementById('users-list');
                if (!tbody.querySelector('.no-results')) {
                    const emptyRow = document.createElement('tr');
                    emptyRow.className = 'no-results';
                    emptyRow.innerHTML = '<td colspan="5" style="text-align: center; color: #999; padding: 2rem;">Nenhum usuário encontrado com esses filtros</td>';
                    tbody.appendChild(emptyRow);
                }
            } else {
                const emptyRow = document.querySelector('.no-results');
                if (emptyRow) emptyRow.remove();
            }
        }

        function limparFiltros() {
            document.getElementById('filterNome').value = '';
            document.getElementById('filterEmail').value = '';
            document.getElementById('filterTipo').value = '';
            document.getElementById('filterFaixa').value = '';
            aplicarFiltros();
        }

        // Adicionar listeners aos filtros
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('filterNome')?.addEventListener('input', aplicarFiltros);
            document.getElementById('filterEmail')?.addEventListener('input', aplicarFiltros);
            document.getElementById('filterTipo')?.addEventListener('change', aplicarFiltros);
            document.getElementById('filterFaixa')?.addEventListener('change', aplicarFiltros);
        });

        // Logout
        function logout() {
            fetch('/api/logout', { method: 'POST' })
                .then(() => {
                    window.location.href = '/login.html';
                })
                .catch(error => console.error('Erro ao fazer logout:', error));
        }

        // Frases motivacionais sobre Jiu-Jitsu
        const jiujitsuQuotes = [
            { text: "A disciplina eh o caminho para a liberdade", author: "Rickson Gracie" },
            { text: "No Jiu-Jitsu, o mais fraco pode vencer o mais forte", author: "Helio Gracie" },
            { text: "Treinar Jiu-Jitsu eh treinar para a vida", author: "Rickson Gracie" },
            { text: "A persistencia no tatame constroi campeoes", author: "Coringa Jiu-Jitsu" },
            { text: "Cada queda eh uma licao, cada vitoria eh um aprendizado", author: "Coringa Jiu-Jitsu" },
            { text: "O Jiu-Jitsu nao eh sobre forca, eh sobre tecnica", author: "Carlos Gracie" },
            { text: "Domine a disciplina, domine o Jiu-Jitsu", author: "Coringa Jiu-Jitsu" },
            { text: "No tatame, voce descobre quem voce realmente eh", author: "Rickson Gracie" },
            { text: "Jiu-Jitsu eh a arte de resolver conflitos sem violencia", author: "Rorion Gracie" },
            { text: "Cada treino eh um passo em direcao a excelencia", author: "Coringa Jiu-Jitsu" }
        ];

        // Exibir frase aleatoria
        function displayRandomQuote() {
            const randomIndex = Math.floor(Math.random() * jiujitsuQuotes.length);
            const quote = jiujitsuQuotes[randomIndex];
            const quoteElement = document.getElementById('motivational-quote');
            quoteElement.innerHTML = '"' + quote.text + '"<br><br><span style="font-size: 0.9rem; font-weight: normal;">- ' + quote.author + '</span>';
        }

        // Carregar frase ao iniciar a pagina
        window.addEventListener('load', displayRandomQuote);
    </script>
</body>
</html>
